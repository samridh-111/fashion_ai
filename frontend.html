<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Stylist - The Digital Atelier</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        app: {
                            sidebar: '#111114',
                            main: '#18181b',
                            card: '#222227',
                            cardHover: '#2a2a30',
                            accent: '#6b5894',
                            accentHover: '#7e6ba8'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * { font-family: 'Inter', sans-serif; }
        
        body {
            background-color: #18181b; /* Tailwind bg-zinc-900 equivalent fallback */
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_BASE = 'http://localhost:8000';

        // --- SVGs ---
        const Icons = {
            Upload: ({className}) => (
                <svg className={className} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
            ),
            Hanger: ({className, size=18}) => (
                <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M22 10.5V12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-1.5" />
                    <path d="M12 2v3" />
                    <path d="m14 7-2 2-2-2" />
                    <path d="M12 4A3 3 0 0 0 9 7v1" />
                </svg>
            ),
            Sparkles: ({className}) => (
                <svg className={className} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
                    <path d="M5 3v4" />
                    <path d="M19 17v4" />
                    <path d="M3 5h4" />
                    <path d="M17 19h4" />
                </svg>
            ),
            Chart: ({className}) => (
                <svg className={className} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <rect width="18" height="18" x="3" y="3" rx="2" />
                    <path d="M7 17v-4" />
                    <path d="M12 17v-8" />
                    <path d="M17 17v-6" />
                </svg>
            ),
            CloudUpload: ({className}) => (
                <svg className={className} width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M12 13v8" />
                    <path d="M12 13l-4 4" />
                    <path d="M12 13l4 4" />
                    <path d="M20.39 12.39A5 5 0 0 0 18 3h-1.26A8 8 0 1 0 3 16.3" />
                    <path d="M16 16l-4-4-4 4" />
                </svg>
            ),
            Shirt: ({className, size=18}) => (
                <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="currentColor">
                   <path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.47a1 1 0 00.99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.84l.58-3.47a2 2 0 00-1.34-2.23z"/>
                </svg>
            )
        };

        // --- Toast utility ---
        const ToastManager = {
            listeners: [],
            subscribe(listener) { this.listeners.push(listener); },
            show(msg, type = 'info') { this.listeners.forEach(l => l(msg, type)); }
        };

        const ToastContainer = () => {
            const [toasts, setToasts] = useState([]);
            useEffect(() => {
                const handler = (msg, type) => {
                    const id = Date.now();
                    setToasts(prev => [...prev, {id, msg, type}]);
                    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
                };
                ToastManager.subscribe(handler);
            }, []);

            return (
                <div className="fixed bottom-6 right-6 z-50 flex flex-col gap-2 pointer-events-none">
                    {toasts.map(t => (
                        <div key={t.id} className={`fade-in px-4 py-3 rounded-xl text-sm font-medium shadow-2xl border flex items-center gap-3 bg-app-card text-white 
                            ${t.type === 'success' ? 'border-emerald-500/50' : t.type === 'error' ? 'border-red-500/50' : 'border-[#3f3f46]'}`}>
                            {t.type === 'success' && <div className="w-2 h-2 rounded-full bg-emerald-400"></div>}
                            {t.type === 'error' && <div className="w-2 h-2 rounded-full bg-red-400"></div>}
                            {t.msg}
                        </div>
                    ))}
                </div>
            );
        };

        // --- Core Application ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('upload');
            const [wardrobe, setWardrobe] = useState({ tops: [], bottoms: [] });
            const [recommendations, setRecommendations] = useState([]);
            const [occasion, setOccasion] = useState('');
            const [loading, setLoading] = useState(false);
            const [stats, setStats] = useState(null);

            useEffect(() => { loadWardrobe(); loadStats(); }, []);

            const apiFetch = async (path, options = {}) => {
                const res = await fetch(API_BASE + path, options);
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
                return data;
            };

            const loadWardrobe = async () => {
                try {
                    const data = await apiFetch('/api/wardrobe');
                    setWardrobe(data);
                } catch (e) {
                    console.error('Error loading wardrobe:', e);
                }
            };

            const loadStats = async () => {
                try {
                    const data = await apiFetch('/api/stats');
                    setStats(data);
                } catch (e) {
                    console.error('Error loading stats:', e);
                }
            };

            const handleUploadFinished = () => { loadWardrobe(); loadStats(); };

            const handleDelete = async (itemId) => {
                if (!confirm('Are you sure you want to delete this item?')) return;
                try {
                    await apiFetch(`/api/wardrobe/${itemId}`, { method: 'DELETE' });
                    loadWardrobe(); loadStats();
                    ToastManager.show('Item removed', 'success');
                } catch (e) { ToastManager.show('Error: ' + e.message, 'error'); }
            };

            const handleRecommend = async () => {
                if (!occasion.trim()) {
                    ToastManager.show('Please enter an occasion', 'info');
                    return;
                }
                setLoading(true);
                try {
                    const data = await apiFetch('/api/recommend', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ occasion, num_results: 5 })
                    });
                    if (data.recommendations?.length) {
                        setRecommendations(data.recommendations);
                        setActiveTab('recommendations');
                    } else {
                        ToastManager.show(data.message || 'No recommendations found', 'info');
                    }
                } catch (e) { ToastManager.show('Error: ' + e.message, 'error'); }
                finally { setLoading(false); }
            };

            const handleLike = async (topId, bottomId) => {
                try {
                    const data = await apiFetch('/api/feedback', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ top_id: topId, bottom_id: bottomId, liked: true, occasion })
                    });
                    ToastManager.show(data.message, 'success');
                    loadStats();
                } catch (e) { console.error('Error sending feedback:', e); }
            };

            const handleReject = async (topId, bottomId) => {
                setLoading(true);
                try {
                    const alt = await apiFetch('/api/alternative', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ rejected_top_id: topId, rejected_bottom_id: bottomId, occasion })
                    });
                    setRecommendations(prev => {
                        const filtered = prev.filter(r => !(r.top.id === topId && r.bottom.id === bottomId));
                        return [alt, ...filtered];
                    });
                    ToastManager.show('New alternative loaded', 'info');
                    loadStats();
                } catch (e) { ToastManager.show('No more alternatives. Try a new text!', 'info'); } 
                finally { setLoading(false); }
            };

            return (
                <div className="flex h-screen w-full bg-app-main text-white font-sans overflow-hidden">
                    {/* Left Sidebar */}
                    <aside className="w-[240px] flex-shrink-0 bg-app-sidebar border-r border-[#27272a]/80 flex flex-col px-4 py-8 relative z-20">
                        <div className="mb-10 px-2 cursor-pointer" onClick={()=>setActiveTab('upload')}>
                            <h1 className="text-xl font-bold tracking-tight text-white mb-1">AI Stylist</h1>
                            <p className="text-[10px] tracking-widest text-[#8a8a93] uppercase">The Digital Atelier</p>
                        </div>
                        
                        <nav className="flex flex-col gap-1">
                            <button onClick={() => setActiveTab('upload')} className={`flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors ${activeTab === 'upload' ? 'bg-[#27272a] text-white' : 'text-[#8a8a93] hover:text-white hover:bg-[#27272a]/40'}`}>
                                <Icons.Upload className="w-5 h-5"/> Upload
                            </button>
                            <button onClick={() => setActiveTab('wardrobe')} className={`flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors ${activeTab === 'wardrobe' ? 'bg-[#27272a] text-white' : 'text-[#8a8a93] hover:text-white hover:bg-[#27272a]/40'}`}>
                                <Icons.Hanger className="w-5 h-5"/> Wardrobe
                            </button>
                            <button onClick={() => setActiveTab('recommend')} className={`flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors ${activeTab === 'recommend' ? 'bg-[#27272a] text-white' : 'text-[#8a8a93] hover:text-white hover:bg-[#27272a]/40'}`}>
                                <Icons.Sparkles className="w-5 h-5"/> Generate Looks
                            </button>
                            <button onClick={() => setActiveTab('recommendations')} className={`flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors ${activeTab === 'recommendations' ? 'bg-[#27272a] text-white' : 'text-[#8a8a93] hover:text-white hover:bg-[#27272a]/40'}`}>
                                <Icons.Chart className="w-5 h-5"/> Results
                            </button>
                        </nav>
                    </aside>

                    {/* Main Workspace */}
                    <div className="flex-1 flex flex-col relative overflow-hidden bg-app-main">
                        {/* Top Statistics Bar */}
                        <header className="h-[60px] flex items-center justify-center border-b border-[#27272a]/50 bg-app-main/80 backdrop-blur-md px-6 text-xs font-semibold tracking-wide absolute top-0 left-0 right-0 z-10 gap-x-8 shadow-sm">
                            <span className="text-white text-sm">Wardrobe Intelligence</span>
                            <span className="text-[#8a8a93]">ITEMS: {stats ? stats.wardrobe.total_items : 0}</span>
                            <span className="text-[#8a8a93]">LOOKS: {stats ? stats.feedback.total_feedback : 0}</span>
                            <span className="text-emerald-400">AI CONFIDENCE: 98%</span>
                        </header>
                        
                        <main className="flex-1 overflow-y-auto pt-[60px] pb-12 px-8 lg:px-16 xl:px-24">
                            {activeTab === 'upload' && <UploadTab onUploadFinished={handleUploadFinished} onNavigateRecommend={()=>setActiveTab('recommend')}/>}
                            {activeTab === 'wardrobe' && <WardrobeTab wardrobe={wardrobe} onDelete={handleDelete} />}
                            {activeTab === 'recommend' && <RecommendTab occasion={occasion} setOccasion={setOccasion} handleRecommend={handleRecommend} loading={loading} />}
                            {activeTab === 'recommendations' && <RecommendationsTab occasion={occasion} recommendations={recommendations} onLike={handleLike} onReject={handleReject} loading={loading} onNewSearch={()=>setActiveTab('recommend')} />}
                        </main>
                    </div>
                    <ToastContainer />
                </div>
            );
        };

        // --- Tab Components ---

        const UploadTab = ({ onUploadFinished, onNavigateRecommend }) => {
            return (
                <div className="max-w-4xl mx-auto min-h-[calc(100vh-120px)] flex flex-col fade-in pt-12 relative pb-8">
                    <div className="mb-10">
                        <h2 className="text-[44px] leading-none font-extrabold tracking-tight mb-4 text-white lowercase"><span className="capitalize">Build</span> your wardrobe</h2>
                        <p className="text-[#a1a1aa] text-[15px] max-w-xl leading-relaxed">
                            Upload your clothing items to start generating AI-powered outfit recommendations tailored to your style.
                        </p>
                    </div>

                    <div className="grid md:grid-cols-2 gap-6 flex-1 min-h-[300px] mb-16">
                        <div className="bg-app-card rounded-2xl p-6 border border-[#2e2e32] flex flex-col shadow-xl">
                            <div className="flex justify-between items-start mb-6">
                                <div>
                                    <h3 className="text-xl font-bold mb-1 text-white tracking-tight">Tops</h3>
                                    <p className="text-xs text-[#8a8a93]">Shirts, t-shirts, jackets, hoodies</p>
                                </div>
                                <div className="w-10 h-10 rounded-full bg-[#2e2e34] flex items-center justify-center text-[#c4b5fd]">
                                    <Icons.Hanger size={20} />
                                </div>
                            </div>
                            <UploadZone category="top" onUpload={onUploadFinished} />
                        </div>

                        <div className="bg-app-card rounded-2xl p-6 border border-[#2e2e32] flex flex-col shadow-xl">
                            <div className="flex justify-between items-start mb-6">
                                <div>
                                    <h3 className="text-xl font-bold mb-1 text-white tracking-tight">Bottoms</h3>
                                    <p className="text-xs text-[#8a8a93]">Jeans, trousers, shorts, skirts</p>
                                </div>
                                <div className="w-10 h-10 rounded-full bg-[#2e2e34] flex items-center justify-center text-[#2dd4bf]">
                                    <Icons.Shirt size={20} /> 
                                </div>
                            </div>
                            <UploadZone category="bottom" onUpload={onUploadFinished} />
                        </div>
                    </div>

                    {/* Bottom action centered via mt-auto */}
                    <div className="flex flex-col items-center justify-end mt-auto">
                        <button onClick={onNavigateRecommend} className="bg-app-accent hover:bg-app-accentHover text-white px-8 py-3.5 rounded-full font-semibold transition-colors flex items-center gap-2 mb-4 text-sm shadow-xl shadow-app-accent/10">
                            Generate outfits <Icons.Sparkles className="w-4 h-4" />
                        </button>
                        <p className="text-[10px] tracking-[0.2em] text-[#8a8a93] uppercase font-semibold">Ready to refine your signature style</p>
                    </div>
                </div>
            );
        };

        const UploadZone = ({ category, onUpload }) => {
            const [isDragging, setIsDragging] = useState(false);
            const [uploading, setUploading] = useState(false);
            const fileInputRef = useRef(null);

            const handleFile = async (file) => {
                if (!file || !file.type.startsWith('image/')) {
                    ToastManager.show('Please upload an image file', 'error');
                    return;
                }
                setUploading(true);
                const formData = new FormData();
                formData.append('file', file);
                formData.append('category', category);

                try {
                    const response = await fetch(`${API_BASE}/api/upload`, { method: 'POST', body: formData });
                    if (response.ok) {
                        const data = await response.json();
                        onUpload(data);
                        ToastManager.show(`Uploaded successfully`, 'success');
                    } else {
                        const error = await response.json();
                        ToastManager.show(error.detail || 'Upload failed', 'error');
                    }
                } catch (error) { ToastManager.show('Error: ' + error.message, 'error'); }
                finally { setUploading(false); }
            };

            const handleDrop = (e) => { e.preventDefault(); setIsDragging(false); handleFile(e.dataTransfer.files[0]); };
            const handleDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
            const handleDragLeave = () => setIsDragging(false);

            return (
                <div
                    className={`flex-1 border-2 border-dashed rounded-xl flex flex-col items-center justify-center p-8 transition-colors cursor-pointer relative overflow-hidden group 
                        ${isDragging ? 'border-app-accent bg-[#2a2a30]' : 'border-[#3f3f46]/60 bg-[#1a1a1e]/50 hover:border-[#52525b] hover:bg-[#202024]'}`}
                    onDrop={handleDrop} onDragOver={handleDragOver} onDragLeave={handleDragLeave} onClick={() => fileInputRef.current?.click()}
                >
                    <input ref={fileInputRef} type="file" accept="image/*" onChange={(e)=>handleFile(e.target.files?.[0])} className="hidden" />
                    
                    {uploading ? (
                        <div className="text-zinc-400 text-sm flex flex-col items-center">
                            <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-app-accent mb-3"></div>
                            Processing image...
                        </div>
                    ) : (
                        <>
                            <div className="mb-4 text-[#8a8a93] group-hover:text-white transition-colors duration-300">
                                <Icons.CloudUpload />
                            </div>
                            <p className="font-semibold text-white text-sm mb-1.5 transition-colors">Drag & drop or click to upload</p>
                            <p className="text-[11px] text-[#71717a]">Supports JPG and PNG · Max 10MB</p>
                        </>
                    )}
                </div>
            );
        };

        const WardrobeTab = ({ wardrobe, onDelete }) => (
            <div className="max-w-6xl mx-auto fade-in pt-12 pb-12">
                <h2 className="text-[32px] font-extrabold tracking-tight mb-8 text-white">Your Wardrobe</h2>
                
                <div className="mb-12">
                    <div className="flex items-center gap-3 mb-6">
                        <h3 className="text-lg font-semibold text-white">Tops</h3>
                        <span className="bg-app-card text-[#a1a1aa] px-2.5 py-0.5 rounded-full text-xs font-semibold border border-[#3f3f46]/50">{wardrobe.tops.length}</span>
                    </div>
                    {wardrobe.tops.length ? (
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                            {wardrobe.tops.map(item => <WardrobeItem key={item.id} item={item} onDelete={onDelete} />)}
                        </div>
                    ) : (
                        <div className="text-[#71717a] text-sm">No tops uploaded yet.</div>
                    )}
                </div>

                <div>
                    <div className="flex items-center gap-3 mb-6">
                        <h3 className="text-lg font-semibold text-white">Bottoms</h3>
                        <span className="bg-app-card text-[#a1a1aa] px-2.5 py-0.5 rounded-full text-xs font-semibold border border-[#3f3f46]/50">{wardrobe.bottoms.length}</span>
                    </div>
                    {wardrobe.bottoms.length ? (
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                            {wardrobe.bottoms.map(item => <WardrobeItem key={item.id} item={item} onDelete={onDelete} />)}
                        </div>
                    ) : (
                        <div className="text-[#71717a] text-sm">No bottoms uploaded yet.</div>
                    )}
                </div>
            </div>
        );

        const WardrobeItem = ({ item, onDelete }) => (
            <div className="relative group bg-app-card border border-[#2e2e32] rounded-xl overflow-hidden shadow-lg p-1.5 transition-transform hover:-translate-y-1">
                <img src={`${API_BASE}${item.image_url}`} alt={item.filename} className="w-full aspect-[4/5] object-cover rounded-lg bg-[#18181b]" />
                <button
                    onClick={() => onDelete(item.id)}
                    className="absolute top-3 right-3 bg-red-500/90 text-white p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-all hover:bg-red-600 hover:scale-105"
                >
                    <svg className="w-3 h-3" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
        );

        const RecommendTab = ({ occasion, setOccasion, handleRecommend, loading }) => {
            const presets = ['Office', 'Date Night', 'Casual', 'Party', 'Interview', 'Sunny Day', 'Formal'];
            return (
                <div className="max-w-[560px] mx-auto flex flex-col pt-20 fade-in min-h-[calc(100vh-120px)]">
                    <div className="mb-10 text-center">
                        <h2 className="text-[40px] font-extrabold tracking-tight mb-4 text-white">Curate your look</h2>
                        <p className="text-[#a1a1aa] text-[15px]">Describe the occasion to generate AI-curated outfits.</p>
                    </div>
                    
                    <div className="w-full bg-app-card rounded-2xl p-8 border border-[#2e2e32] shadow-2xl">
                        <label className="block text-sm font-semibold mb-3 text-white">What's the occasion?</label>
                        <input
                            type="text" value={occasion} onChange={(e) => setOccasion(e.target.value)}
                            placeholder="e.g., formal dinner, casual friday, rainy day..."
                            className="w-full p-4 bg-[#18181b] border border-[#3f3f46] rounded-xl text-white mb-6 focus:border-app-accent focus:outline-none focus:ring-1 focus:ring-app-accent/50 transition-all placeholder:text-zinc-600"
                            onKeyDown={(e) => e.key === 'Enter' ? handleRecommend() : null}
                        />
                        
                        <div className="mb-8">
                            <p className="text-[10px] text-zinc-500 mb-3 font-semibold uppercase tracking-widest">Quick Options</p>
                            <div className="flex flex-wrap gap-2">
                                {presets.map(occ => (
                                    <button
                                        key={occ} onClick={() => setOccasion(occ)}
                                        className="px-3 py-1.5 bg-[#2a2a30] text-zinc-300 rounded-lg text-xs font-medium hover:bg-[#3f3f46] hover:text-white transition-colors border border-transparent hover:border-zinc-500"
                                    >
                                        {occ}
                                    </button>
                                ))}
                            </div>
                        </div>
                        
                        <button
                            onClick={handleRecommend} disabled={loading || !occasion.trim()}
                            className="w-full bg-app-accent hover:bg-app-accentHover text-white py-4 rounded-xl text-sm font-bold transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 shadow-lg shadow-app-accent/20 hover:shadow-app-accent/40"
                        >
                            {loading ? <div className="animate-spin rounded-full h-5 w-5 border-b-2 border-white/80"></div> : <><Icons.Sparkles className="w-4 h-4"/> Generate Recommendations</>}
                        </button>
                    </div>
                </div>
            );
        };

        const RecommendationsTab = ({ occasion, recommendations, onLike, onReject, loading, onNewSearch }) => (
            <div className="max-w-6xl mx-auto fade-in pt-8 pb-12">
                <div className="flex justify-between items-center mb-10 border-b border-[#2e2e32] pb-6">
                    <div>
                        <h2 className="text-[32px] font-extrabold tracking-tight text-white mb-1">Your Curated Outfits</h2>
                        <p className="text-[#a1a1aa] text-sm">Tailored for: <span className="text-white font-medium">"{occasion}"</span></p>
                    </div>
                    <button onClick={onNewSearch} className="px-4 py-2 bg-app-card border border-[#3f3f46] text-white rounded-lg text-sm font-medium hover:bg-[#3f3f46] transition-colors">
                        New Search
                    </button>
                </div>
                
                {recommendations.length === 0 ? (
                    <div className="text-center py-24 bg-app-card rounded-2xl border border-[#2e2e32]">
                        <p className="text-zinc-500 text-lg mb-6">No recommendations found.</p>
                        <button onClick={onNewSearch} className="bg-white text-black px-6 py-2.5 rounded-lg font-medium">Try Again</button>
                    </div>
                ) : (
                    <div className="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        {recommendations.map((rec, idx) => <OutfitCard key={`${rec.top.id}-${rec.bottom.id}-${idx}`} rec={rec} onLike={onLike} onReject={onReject} loading={loading} idx={idx} />)}
                    </div>
                )}
            </div>
        );

        const OutfitCard = ({ rec, onLike, onReject, loading, idx }) => {
            const bd = rec.score_breakdown || {};
            const pct = rec.match_score || 0;
            return (
                <div className="bg-app-card border border-[#2e2e32] rounded-2xl overflow-hidden shadow-xl flex flex-col fade-in relative group" style={{animationDelay: `${idx*0.05}s`}}>
                    <div className="grid grid-cols-2 gap-[1px] bg-[#2e2e32]">
                        <div className="bg-app-card p-3 pb-0">
                            <span className="text-[9px] font-bold text-zinc-500 uppercase tracking-widest block mb-1">Top</span>
                            <img src={`${API_BASE}${rec.top.image_url}`} alt="Top" className="w-full aspect-square object-cover rounded-xl bg-[#18181b] border border-[#2e2e32]/50" />
                        </div>
                        <div className="bg-app-card p-3 pb-0">
                            <span className="text-[9px] font-bold text-zinc-500 uppercase tracking-widest block mb-1">Bottom</span>
                            <img src={`${API_BASE}${rec.bottom.image_url}`} alt="Bottom" className="w-full aspect-square object-cover rounded-xl bg-[#18181b] border border-[#2e2e32]/50" />
                        </div>
                    </div>
                    
                    <div className="p-5 flex-1 flex flex-col">
                        <div className="flex items-center gap-4 mb-5">
                            <ScoreRing score={pct} />
                            <div className="flex-1">
                                <p className="text-[13px] text-zinc-200 leading-snug font-medium line-clamp-2">{rec.explanation}</p>
                            </div>
                        </div>

                        <div className="space-y-2 mb-6 mt-1">
                            {Object.entries(bd).map(([key, value]) => (
                                <div key={key} className="flex items-center text-[10px] font-medium tracking-wide">
                                    <span className="w-16 text-zinc-500 uppercase">{key}</span>
                                    <div className="flex-1 bg-[#18181b] rounded-full h-1 ml-2">
                                        <div className="bg-[#6b5894] h-1 rounded-full transition-all duration-700 ease-out delay-300" style={{ width: `${value * 100}%` }}></div>
                                    </div>
                                    <span className="ml-3 text-zinc-400 w-6 text-right">{(value * 100).toFixed(0)}%</span>
                                </div>
                            ))}
                        </div>
                        
                        <div className="flex gap-2 mt-auto pt-4 border-t border-[#2e2e32]/80">
                            <button onClick={()=>onLike(rec.top.id, rec.bottom.id)} disabled={loading} className="flex-1 bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500/20 py-2.5 rounded-xl font-medium transition-colors text-xs border border-emerald-500/10 hover:border-emerald-500/30">
                                Perfect Match
                            </button>
                            <button onClick={()=>onReject(rec.top.id, rec.bottom.id)} disabled={loading} className="flex-1 bg-[#18181b] text-zinc-300 hover:text-white border border-[#3f3f46] hover:bg-[#3f3f46]/50 py-2.5 rounded-xl font-medium transition-colors text-xs">
                                Replace
                            </button>
                        </div>
                    </div>
                </div>
            )
        };

        const ScoreRing = ({ score }) => {
            const circumference = 2 * Math.PI * 26;
            const offset = circumference - (score / 100) * circumference;
            // The image states "AI CONFIDENCE" in soft green. So a good match should be emerald.
            const getColor = (s) => s >= 80 ? '#34d399' : s >= 60 ? '#fbbf24' : '#f87171';
            
            return (
                <div className="flex flex-col items-center justify-center relative w-[56px] h-[56px] shrink-0">
                    <svg className="transform -rotate-90 w-full h-full" viewBox="0 0 60 60">
                        <circle cx="30" cy="30" r="26" stroke="#27272a" strokeWidth="4" fill="none" />
                        <circle
                            cx="30" cy="30" r="26"
                            stroke={getColor(score)}
                            strokeWidth="4" fill="none"
                            strokeDasharray={circumference}
                            strokeDashoffset={offset}
                            strokeLinecap="round"
                            className="transition-all duration-1000 ease-out delay-150"
                        />
                    </svg>
                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                        <span className="text-sm font-bold tracking-tighter" style={{ color: getColor(score) }}>{score}</span>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
